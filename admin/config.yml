backend:
  name: git-gateway
  branch: main

# For local testing: run `npx decap-server` in terminal
local_backend: true

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "content"
    label: "Website Content"
    files:
      # Hero Section
      - name: "hero"
        label: "Hero Section"
        file: "content/hero.json"
        fields:
          - { label: "Badge Text", name: "badge", widget: "string" }
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Subheadline", name: "subheadline", widget: "text" }
          - { label: "CTA Button Text", name: "ctaText", widget: "string" }
          - { label: "CTA Button Link", name: "ctaLink", widget: "string" }
          - { label: "Secondary CTA Text", name: "secondaryCtaText", widget: "string" }
          - { label: "Secondary CTA Link", name: "secondaryCtaLink", widget: "string" }

      # Services
      - name: "services"
        label: "Services & Stats"
        file: "content/services.json"
        fields:
          - { label: "Section Label", name: "sectionLabel", widget: "string" }
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Icon (Emoji)", name: "icon", widget: "string", hint: "Use an emoji like 🛡️" }
          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Number", name: "number", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }

      # About Page
      - name: "about"
        label: "About Page"
        file: "content/about.json"
        fields:
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Story", name: "story", widget: "text", hint: "Use \\n\\n for paragraph breaks" }
          - { label: "Mission Statement", name: "mission", widget: "string" }
          - label: "Team Members"
            name: "team"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Bio", name: "bio", widget: "text" }
              - { label: "Photo", name: "image", widget: "image" }

      # Contact Page
      - name: "contact"
        label: "Contact Information"
        file: "content/contact.json"
        fields:
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Address", name: "address", widget: "text" }
          - label: "Social Media"
            name: "social"
            widget: "object"
            fields:
              - { label: "Twitter", name: "twitter", widget: "string" }
              - { label: "LinkedIn", name: "linkedin", widget: "string" }
              - { label: "GitHub", name: "github", widget: "string" }