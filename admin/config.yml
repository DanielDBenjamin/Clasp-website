backend:
  name: github
  repo: your-org/Clasp-website  # Update this with your GitHub username/org and repo name
  branch: main  # Branch to update (optional, defaults to master)

media_folder: "static/images"  # Media files will be stored in the repo under static/images
public_folder: "/images"  # The src attribute for uploaded media will begin with /images

collections:
  - name: "hero"
    label: "Hero Section"
    files:
      - file: "content/hero.json"
        label: "Hero Content"
        name: "hero"
        fields:
          - {label: "Headline", name: "headline", widget: "string"}
          - {label: "Subline", name: "subline", widget: "string"}
          - {label: "CTA Text", name: "cta_text", widget: "string"}
          - {label: "CTA URL", name: "cta_url", widget: "string"}

  - name: "about"
    label: "About Section"
    files:
      - file: "content/about.json"
        label: "About Content"
        name: "about"
        fields:
          - {label: "Company Name", name: "company_name", widget: "string"}
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Image", name: "image", widget: "image", required: false}

  - name: "services"
    label: "Services Section"
    files:
      - file: "content/services.json"
        label: "Services Content"
        name: "services"
        fields:
          - {label: "Section Title", name: "title", widget: "string"}
          - label: "Services"
            name: "items"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Icon", name: "icon", widget: "string", required: false}

  - name: "contact"
    label: "Contact Section"
    files:
      - file: "content/contact.json"
        label: "Contact Content"
        name: "contact"
        fields:
          - {label: "Section Title", name: "title", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "Address", name: "address", widget: "string"}
          - label: "Social Links"
            name: "social"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "URL", name: "url", widget: "string"}
